services:
  web:
    build: .
    ports:
      - "${HOST_PORT:-8877}:6000"
      # The AVR's vTuner firmware hardcodes port 80.
      - "80:6000"
    volumes:
      - .:/app
    environment:
      - DENON_IP=${DENON_IP}
    env_file:
      - .env
    restart: unless-stopped

  # Resolves *.vtuner.com to this host so the AVR's native Internet Radio mode
  # talks to the app; forwards everything else to DNS_UPSTREAM. Opt-in:
  #   docker compose --profile dns up -d
  # Point the AVR's DNS (manual network setup on the AVR) at this host.
  vtuner-dns:
    image: 4km3/dnsmasq:2.90-r3
    profiles: ["dns"]
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    command:
      - --no-resolv
      - --log-facility=-
      - --address=/vtuner.com/${HOST_IP}
      - --server=${DNS_UPSTREAM:-1.1.1.1}
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
